<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#15121f">
<title>マイ・カラオケ曲帳</title>
<style>
:root{
  --bg:#15121f; --bg2:#1d1830; --panel:#221c38; --panel2:#2a2344;
  --line:#3a3258; --txt:#f3eefe; --muted:#a79fc4; --muted2:#7d76a0;
  --gold:#f5c451; --gold2:#e0a93a;
  --c-sing:#4ad6a0;      /* 歌える */
  --c-try:#f5c451;       /* 歌ってみたい */
  --c-req:#f278c0;       /* リクエスト */
  --c-fr:#7aa7ff;        /* 友人 */
  --up:#ff8a5c; --down:#6fd0ff; --flat:#a79fc4;
  --radius:16px;
  --safe-b:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(1200px 500px at 50% -200px, #3a2c5e 0%, transparent 60%),
    radial-gradient(800px 400px at 100% 0%, #2a2150 0%, transparent 55%),
    var(--bg);
  color:var(--txt);
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic",system-ui,sans-serif;
  font-feature-settings:"palt";
  -webkit-text-size-adjust:100%;
  min-height:100vh;
}
.wrap{max-width:720px;margin:0 auto;padding:0 14px 120px}

/* ヘッダー */
header{position:sticky;top:0;z-index:30;padding-top:env(safe-area-inset-top);
  background:linear-gradient(180deg,rgba(21,18,31,.96),rgba(21,18,31,.86));
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.headin{max-width:720px;margin:0 auto;padding:12px 14px 10px}
.brand{display:flex;align-items:center;gap:10px}
.brand .mic{font-size:24px;filter:drop-shadow(0 0 10px rgba(245,196,81,.5))}
.brand h1{margin:0;font-size:19px;letter-spacing:.04em;font-weight:800}
.brand .sub{margin-left:auto;font-size:12px;color:var(--muted);font-weight:600}
.menubtn{margin-left:8px;width:38px;height:38px;border-radius:11px;border:1px solid var(--line);
  background:var(--panel);color:var(--txt);font-size:17px;cursor:pointer;display:grid;place-items:center}

/* 検索 */
.searchbar{margin-top:11px;position:relative}
.searchbar input{width:100%;padding:12px 40px 12px 40px;border-radius:13px;border:1px solid var(--line);
  background:var(--panel);color:var(--txt);font-size:16px;outline:none}
.searchbar input::placeholder{color:var(--muted2)}
.searchbar .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px}
.searchbar .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:0;background:transparent;
  color:var(--muted);font-size:20px;cursor:pointer;width:30px;height:30px;border-radius:50%;display:none}
.searchbar .clr.on{display:block}

/* カテゴリタブ */
.tabs{display:flex;gap:7px;overflow-x:auto;margin-top:11px;padding-bottom:2px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;border:1px solid var(--line);background:var(--panel);color:var(--muted);
  padding:8px 13px;border-radius:999px;font-size:13.5px;font-weight:700;cursor:pointer;white-space:nowrap;
  display:flex;align-items:center;gap:7px;transition:transform .08s}
.tab .dot{width:8px;height:8px;border-radius:50%;background:var(--muted2)}
.tab .n{font-size:12px;color:var(--muted2);font-weight:800}
.tab.active{color:#15121f;background:var(--gold);border-color:var(--gold)}
.tab.active .n{color:#15121f}
.tab.active.c-sing{background:var(--c-sing);border-color:var(--c-sing)}
.tab.active.c-try{background:var(--c-try);border-color:var(--c-try)}
.tab.active.c-req{background:var(--c-req);border-color:var(--c-req)}
.tab.active.c-fr{background:var(--c-fr);border-color:var(--c-fr)}
.tab.active .dot{display:none}

/* サブフィルタ（メニュー） */
.filters{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px;align-items:center}
.chip{border:1px solid var(--line);background:transparent;color:var(--muted);
  padding:6px 11px;border-radius:999px;font-size:12.5px;font-weight:700;cursor:pointer}
.chip.on{background:var(--panel2);color:var(--txt);border-color:#574d80}
.spacer{flex:1}
.sortsel{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:10px;
  padding:6px 9px;font-size:12.5px;font-weight:700}

/* 件数 */
.count{margin:13px 2px 8px;font-size:12.5px;color:var(--muted);font-weight:600}
.count b{color:var(--gold)}

/* カード */
.list{display:flex;flex-direction:column;gap:10px}
.card{position:relative;border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),var(--bg2));
  border-radius:var(--radius);padding:13px 14px;cursor:pointer;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--muted2)}
.card.c-sing::before{background:var(--c-sing)}
.card.c-try::before{background:var(--c-try)}
.card.c-req::before{background:var(--c-req)}
.card.c-fr::before{background:var(--c-fr)}
.card .top{display:flex;align-items:flex-start;gap:10px}
.title{font-size:16.5px;font-weight:800;line-height:1.35;flex:1;letter-spacing:.01em}
.artist{margin-top:3px;font-size:13px;color:var(--muted);font-weight:600}
.keychip{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-width:46px;height:46px;border-radius:12px;border:1px solid var(--line);background:var(--bg);padding:0 6px}
.keychip .kv{font-size:15px;font-weight:900;line-height:1}
.keychip .kl{font-size:9px;color:var(--muted2);margin-top:2px;font-weight:700}
.keychip.up{border-color:rgba(255,138,92,.45)} .keychip.up .kv{color:var(--up)}
.keychip.down{border-color:rgba(111,208,255,.45)} .keychip.down .kv{color:var(--down)}
.keychip.flat .kv{color:var(--flat)}
.keychip.none .kv{color:var(--muted2);font-size:13px}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.tag{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:7px;background:var(--panel2);color:var(--muted)}
.tag.voice{color:#d9d2f5}
.tag.duet{background:rgba(242,120,192,.16);color:#f7a8d8}
.tag.year{background:rgba(122,167,255,.14);color:#9cc0ff}
.tag.cat{font-weight:800}
.tag.cat.c-sing{background:rgba(74,214,160,.15);color:var(--c-sing)}
.tag.cat.c-try{background:rgba(245,196,81,.15);color:var(--c-try)}
.tag.cat.c-req{background:rgba(242,120,192,.15);color:var(--c-req)}
.tag.cat.c-fr{background:rgba(122,167,255,.15);color:var(--c-fr)}
.memo{margin-top:9px;font-size:12.5px;color:var(--muted);line-height:1.5;
  background:var(--bg);border-radius:9px;padding:7px 10px;border:1px dashed var(--line)}

.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .em{font-size:40px;margin-bottom:10px}
.empty p{margin:6px 0;font-size:14px}

/* FAB */
.fab{position:fixed;right:18px;bottom:calc(20px + var(--safe-b));z-index:40;
  height:56px;padding:0 22px;border-radius:999px;border:0;cursor:pointer;
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:#15121f;
  font-size:16px;font-weight:900;letter-spacing:.02em;
  box-shadow:0 10px 28px rgba(245,196,81,.4);display:flex;align-items:center;gap:8px}
.fab .p{font-size:22px;line-height:1}

/* モーダル */
.overlay{position:fixed;inset:0;z-index:60;background:rgba(8,6,14,.6);backdrop-filter:blur(3px);
  display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{width:100%;max-width:720px;max-height:92vh;overflow-y:auto;background:var(--bg2);
  border:1px solid var(--line);border-bottom:0;border-radius:22px 22px 0 0;
  padding:8px 18px calc(26px + var(--safe-b));-webkit-overflow-scrolling:touch}
.grip{width:42px;height:5px;border-radius:3px;background:var(--line);margin:8px auto 14px}
.sheet h2{margin:0 0 16px;font-size:18px;font-weight:800}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;color:var(--muted);font-weight:700;margin-bottom:6px}
.field input[type=text],.field input[type=number],.field select,.field textarea{
  width:100%;padding:11px 12px;border-radius:11px;border:1px solid var(--line);
  background:var(--panel);color:var(--txt);font-size:16px;outline:none;font-family:inherit}
.field textarea{resize:vertical;min-height:62px;line-height:1.5}
.field .hint{font-size:11px;color:var(--muted2);margin-top:5px}
.catrow{display:flex;gap:7px;flex-wrap:wrap}
.catpick{flex:1;min-width:calc(50% - 4px);border:1px solid var(--line);background:var(--panel);
  color:var(--muted);padding:11px 8px;border-radius:11px;font-size:13.5px;font-weight:800;cursor:pointer;text-align:center}
.catpick.sel{color:#15121f}
.catpick.sel.c-sing{background:var(--c-sing);border-color:var(--c-sing)}
.catpick.sel.c-try{background:var(--c-try);border-color:var(--c-try)}
.catpick.sel.c-req{background:var(--c-req);border-color:var(--c-req)}
.catpick.sel.c-fr{background:var(--c-fr);border-color:var(--c-fr)}
.keyrow{display:flex;gap:8px;align-items:center}
.keyrow input{flex:1}
.kbtn{width:42px;height:44px;border-radius:11px;border:1px solid var(--line);background:var(--panel);
  color:var(--txt);font-size:19px;font-weight:800;cursor:pointer}
.voicerow,.duetrow{display:flex;gap:7px}
.vpick{flex:1;border:1px solid var(--line);background:var(--panel);color:var(--muted);
  padding:10px 6px;border-radius:11px;font-size:13.5px;font-weight:700;cursor:pointer;text-align:center}
.vpick.sel{background:var(--panel2);color:var(--txt);border-color:#574d80}
.actions{display:flex;gap:10px;margin-top:8px}
.btn{flex:1;padding:14px;border-radius:13px;border:0;font-size:16px;font-weight:800;cursor:pointer}
.btn.save{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#15121f}
.btn.cancel{background:var(--panel);color:var(--txt);border:1px solid var(--line)}
.btn.del{background:rgba(255,90,90,.14);color:#ff8a8a;border:1px solid rgba(255,90,90,.35)}
.btn.full{width:100%}

/* メニューシート項目 */
.menuitem{display:flex;align-items:center;gap:12px;width:100%;text-align:left;
  padding:15px 14px;border-radius:13px;border:1px solid var(--line);background:var(--panel);
  color:var(--txt);font-size:15px;font-weight:700;cursor:pointer;margin-bottom:9px}
.menuitem .mi{font-size:19px;width:24px;text-align:center}
.menuitem .md{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px}
.menuitem.danger{color:#ff8a8a}

.toast{position:fixed;left:50%;bottom:calc(92px + var(--safe-b));transform:translateX(-50%) translateY(20px);
  background:#0c0a16;border:1px solid var(--line);color:var(--txt);padding:11px 18px;border-radius:12px;
  font-size:13.5px;font-weight:700;z-index:80;opacity:0;transition:.25s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* タッチ/フォーカス対策 */
@media (hover:hover) and (pointer:fine){
  .card:hover{border-color:#574d80}
  .tab:hover{transform:translateY(-1px)}
  .menuitem:hover{border-color:#574d80}
}
button:focus,button:focus-visible,input:focus,select:focus,textarea:focus{outline:none}
.field input:focus,.field select:focus,.field textarea:focus,.searchbar input:focus{border-color:var(--gold)}
</style>
</head>
<body>
<header>
  <div class="headin">
    <div class="brand">
      <span class="mic">🎤</span>
      <h1>マイ・カラオケ曲帳</h1>
      <span class="sub" id="totalSub"></span>
      <button class="menubtn" id="menuBtn" aria-label="メニュー">☰</button>
    </div>
    <div class="searchbar">
      <span class="ico">🔍</span>
      <input id="search" type="text" inputmode="search" placeholder="曲名・歌手・年・メモで検索">
      <button class="clr" id="clrBtn" aria-label="クリア">×</button>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="filters" id="filters">
      <button class="chip" data-voice="男性">男性</button>
      <button class="chip" data-voice="女性">女性</button>
      <button class="chip" data-voice="グループ">グループ</button>
      <button class="chip" data-duet="1">デュエット</button>
      <span class="spacer"></span>
      <select class="sortsel" id="sortSel">
        <option value="added">追加順</option>
        <option value="title">曲名順</option>
        <option value="artist">歌手順</option>
        <option value="year">年代順</option>
      </select>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="count" id="count"></div>
  <div class="list" id="list"></div>
</div>

<button class="fab" id="addFab"><span class="p">＋</span>新規登録</button>

<!-- 編集/登録シート -->
<div class="overlay" id="editOverlay">
  <div class="sheet">
    <div class="grip"></div>
    <h2 id="editTitle">新規登録</h2>
    <div class="field">
      <label>分類</label>
      <div class="catrow" id="catRow">
        <button class="catpick c-sing" data-cat="歌える">歌える曲</button>
        <button class="catpick c-try" data-cat="歌ってみたい">歌ってみたい</button>
        <button class="catpick c-req" data-cat="リクエスト">リクエスト</button>
        <button class="catpick c-fr" data-cat="友人">友人が好きな曲</button>
      </div>
    </div>
    <div class="field">
      <label>曲名 <span style="color:var(--gold)">*</span></label>
      <input type="text" id="f_title" placeholder="例：雪の華">
    </div>
    <div class="field">
      <label>歌手名</label>
      <input type="text" id="f_artist" placeholder="例：中島美嘉">
    </div>
    <div class="field">
      <label>キー調整</label>
      <div class="keyrow">
        <button class="kbtn" id="keyMinus">−</button>
        <input type="text" id="f_key" placeholder="±0 / +2 / -3" style="text-align:center">
        <button class="kbtn" id="keyPlus">＋</button>
      </div>
      <div class="hint">原曲キーは「±0」。上げる=＋、下げる=−（リストの▼は−）</div>
    </div>
    <div class="field">
      <label>男性・女性・グループ</label>
      <div class="voicerow" id="voiceRow">
        <button class="vpick" data-voice="男性">男性</button>
        <button class="vpick" data-voice="女性">女性</button>
        <button class="vpick" data-voice="グループ">グループ</button>
        <button class="vpick" data-voice="">未設定</button>
      </div>
    </div>
    <div class="field">
      <label>デュエット</label>
      <div class="duetrow" id="duetRow">
        <button class="vpick" data-duet="0">ソロ</button>
        <button class="vpick" data-duet="1">デュエット曲</button>
      </div>
    </div>
    <div class="field">
      <label>作成年度（発売年）</label>
      <input type="number" id="f_year" inputmode="numeric" placeholder="例：2003">
    </div>
    <div class="field">
      <label>メモ</label>
      <textarea id="f_memo" placeholder="アニソン・デュエット相手・練習中・お気に入り など"></textarea>
    </div>
    <div class="actions">
      <button class="btn cancel" id="editCancel">キャンセル</button>
      <button class="btn save" id="editSave">保存する</button>
    </div>
    <div class="actions" id="delRow" style="display:none">
      <button class="btn del full" id="editDelete">この曲を削除</button>
    </div>
  </div>
</div>

<!-- メニューシート -->
<div class="overlay" id="menuOverlay">
  <div class="sheet">
    <div class="grip"></div>
    <h2>メニュー</h2>
    <button class="menuitem" id="mExport"><span class="mi">⬇️</span><span>バックアップを保存<div class="md">全曲をファイル(JSON)に書き出し</div></span></button>
    <button class="menuitem" id="mImport"><span class="mi">⬆️</span><span>バックアップを読み込み<div class="md">別の端末のデータを取り込む（上書き）</div></span></button>
    <button class="menuitem" id="mText"><span class="mi">📄</span><span>一覧テキストをコピー<div class="md">表示中の曲をまとめてコピー</div></span></button>
    <button class="menuitem danger" id="mReset"><span class="mi">↺</span><span>初期データに戻す<div class="md">最初の325曲のリストに戻します</div></span></button>
    <button class="menuitem" id="menuClose" style="justify-content:center;margin-top:6px"><span>閉じる</span></button>
    <input type="file" id="fileInput" accept="application/json,.json" style="display:none">
  </div>
</div>

<div class="toast" id="toast"></div>

  if(!k) return 'none';
  const t=k.trim();
  if(t==='±0'||t==='0'||t==='+0'||t==='-0') return 'flat';
  if(t[0]==='+') return 'up';

}

    cnt.textContent='';
    list.innerHTML=`<div class="empty"><div class="em">🎶</div><p>該当する曲がありません</p>
      <p style="font-size:12.5px;color:var(--muted2)">検索条件を変えるか「＋新規登録」で曲を追加してください</p></div>`;
    return;
  }
  cnt.innerHTML=`<b>${filtered.length}</b> 曲を表示中`;
  list.innerHTML = filtered.map(s=>{
    const cls=CAT_CLASS[s.cat]||'';
    const k=keyLabel(s.key);
    const tags=[];
    tags.push(`<span class="tag cat ${cls}">${CAT_LABEL[s.cat]||s.cat}</span>`);
    if(s.voice) tags.push(`<span class="tag voice">${esc(s.voice)}</span>`);
    if(s.duet) tags.push(`<span class="tag duet">デュエット</span>`);
    if(s.year) tags.push(`<span class="tag year">${esc(s.year)}年</span>`);
    return `<div class="card ${cls}" data-id="${s.id}">
      <div class="top">
        <div style="flex:1;min-width:0">
          <div class="title">${esc(s.title)}</div>
          ${s.artist?`<div class="artist">${esc(s.artist)}</div>`:''}
        </div>
        <div class="keychip ${k.cls}"><span class="kv">${esc(k.v)}</span><span class="kl">${k.l}</span></div>
      </div>
      <div class="tags">${tags.join('')}</div>
      ${s.memo?`<div class="memo">${esc(s.memo)}</div>`:''}
    </div>`;
  }).join('');
}

/* ---- フォーム ---- */
let form = {cat:'歌える', voice:'', duet:false};
function setCat(c){ form.cat=c; document.querySelectorAll('#catRow .catpick').forEach(b=>{
  b.classList.toggle('sel', b.dataset.cat===c); }); }
function setVoice(v){ form.voice=v; document.querySelectorAll('#voiceRow .vpick').forEach(b=>{
  b.classList.toggle('sel', b.dataset.voice===v); }); }
function setDuet(d){ form.duet=!!d; document.querySelectorAll('#duetRow .vpick').forEach(b=>{
  b.classList.toggle('sel', (b.dataset.duet==='1')===form.duet); }); }

function openEdit(song){
  editingId = song ? song.id : null;
  document.getElementById('editTitle').textContent = song ? '曲を編集' : '新規登録';
  document.getElementById('delRow').style.display = song ? 'flex' : 'none';
  const d = song || {cat:(state.cat!=='all'?state.cat:'歌える'),title:'',artist:'',key:'',voice:'',duet:false,year:'',memo:''};
  setCat(d.cat); setVoice(d.voice||''); setDuet(d.duet);
  document.getElementById('f_title').value = d.title||'';
  document.getElementById('f_artist').value = d.artist||'';
  document.getElementById('f_key').value = d.key||'';
  document.getElementById('f_year').value = d.year||'';
  document.getElementById('f_memo').value = d.memo||'';
  openSheet('editOverlay');
}
function readForm(){
  return {
    cat: form.cat,
    title: document.getElementById('f_title').value.trim(),
    artist: document.getElementById('f_artist').value.trim(),
    key: document.getElementById('f_key').value.trim(),
    voice: form.voice,
    duet: form.duet,
    year: parseInt(document.getElementById('f_year').value)||null,
    memo: document.getElementById('f_memo').value.trim()
  };
}
function saveEdit(){
  const d=readForm();
  if(!d.title){ toast('曲名を入力してください'); return; }
  if(editingId){
    const s=songs.find(x=>x.id===editingId); Object.assign(s,d);
    toast('保存しました');
  }else{
    d.id=nextId(); songs.push(d); toast('追加しました');
  }
  save(); render(); closeSheet('editOverlay');
}
function deleteSong(){
  if(!editingId) return;
  if(!confirm('この曲を削除しますか？')) return;
  songs=songs.filter(x=>x.id!==editingId);
  save(); render(); closeSheet('editOverlay'); toast('削除しました');
}

/* キーステッパー */
function stepKey(delta){
  const inp=document.getElementById('f_key'); let t=inp.value.trim();
  let n=0;
  if(t==='±0'||t===''||t==='0') n=0;
  else { const m=t.replace('▼','-').replace('−','-').match(/-?\d+/); n=m?parseInt(m[0]):0; }
  n+=delta;
  inp.value = n===0?'±0':(n>0?'+'+n:String(n));
}

/* ---- シート開閉 ---- */
function openSheet(id){ document.getElementById(id).classList.add('open'); document.body.style.overflow='hidden'; }
function closeSheet(id){ document.getElementById(id).classList.remove('open'); document.body.style.overflow=''; }

/* ---- トースト ---- */
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1800); }

/* ---- 入出力 ---- */
function doExport(){
  const blob=new Blob([JSON.stringify(songs,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  const d=new Date(); const ymd=d.getFullYear()+('0'+(d.getMonth()+1)).slice(-2)+('0'+d.getDate()).slice(-2);
  a.href=url; a.download='karaoke_'+ymd+'.json'; a.click(); URL.revokeObjectURL(url);
  toast('バックアップを保存しました');
}
function doImport(file){
  const r=new FileReader();
  r.onload=()=>{ try{ const data=JSON.parse(r.result);
    if(!Array.isArray(data)) throw 0;
    songs=data.map((s,i)=>Object.assign({id:i+1,cat:'歌える',title:'',artist:'',key:'',voice:'',duet:false,year:null,memo:''},s));
    save(); render(); closeSheet('menuOverlay'); toast('読み込みました（'+songs.length+'曲）');
  }catch(e){ toast('ファイルを読み込めませんでした'); } };
  r.readAsText(file);
}
function doCopyText(){
  const filtered=sortList(songs.filter(matchFilter));
  const lines=filtered.map(s=>{
    let l='・'+s.title; if(s.artist)l+='／'+s.artist; if(s.key)l+=' ['+s.key+']';
    const ex=[]; if(s.voice)ex.push(s.voice); if(s.duet)ex.push('デュエット'); if(s.year)ex.push(s.year+'年');
    if(ex.length)l+=' '+ex.join(' '); if(s.memo)l+=' ※'+s.memo; return l;
  });
  const txt='【カラオケ曲リスト】\n'+lines.join('\n');
  navigator.clipboard?.writeText(txt).then(()=>{toast('コピーしました');closeSheet('menuOverlay');},
    ()=>{ prompt('コピーしてください', txt); });
}
function doReset(){
  if(!confirm('編集内容をすべて消して初期データに戻しますか？')) return;
  songs=JSON.parse(JSON.stringify(SEED)); save(); render(); closeSheet('menuOverlay'); toast('初期データに戻しました');
}

/* ---- イベント ---- */
document.getElementById('tabs').addEventListener('click',e=>{
  const t=e.target.closest('.tab'); if(!t)return; state.cat=t.dataset.cat; render(); blurT(t);});
document.getElementById('filters').addEventListener('click',e=>{
  const c=e.target.closest('.chip'); if(!c)return;
  if(c.dataset.voice!=null){ state.voice = state.voice===c.dataset.voice?'':c.dataset.voice;
    document.querySelectorAll('#filters .chip[data-voice]').forEach(x=>x.classList.toggle('on',x.dataset.voice===state.voice)); }
  else if(c.dataset.duet){ state.duet=!state.duet; c.classList.toggle('on',state.duet); }
  render(); blurT(c);
});
document.getElementById('sortSel').addEventListener('change',e=>{state.sort=e.target.value;render();});
const sb=document.getElementById('search');
sb.addEventListener('input',e=>{ state.q=e.target.value.trim();
  document.getElementById('clrBtn').classList.toggle('on',!!state.q); render(); });
document.getElementById('clrBtn').addEventListener('click',()=>{ sb.value='';state.q='';
  document.getElementById('clrBtn').classList.remove('on'); render(); sb.focus(); });

document.getElementById('list').addEventListener('click',e=>{
  const card=e.target.closest('.card'); if(!card)return;
  const s=songs.find(x=>x.id===parseInt(card.dataset.id)); if(s)openEdit(s);});
document.getElementById('addFab').addEventListener('click',()=>openEdit(null));

document.getElementById('catRow').addEventListener('click',e=>{const b=e.target.closest('.catpick');if(b){setCat(b.dataset.cat);blurT(b);}});
document.getElementById('voiceRow').addEventListener('click',e=>{const b=e.target.closest('.vpick');if(b){setVoice(b.dataset.voice);blurT(b);}});
document.getElementById('duetRow').addEventListener('click',e=>{const b=e.target.closest('.vpick');if(b){setDuet(b.dataset.duet==='1');blurT(b);}});
document.getElementById('keyPlus').addEventListener('click',()=>stepKey(1));
document.getElementById('keyMinus').addEventListener('click',()=>stepKey(-1));
document.getElementById('editSave').addEventListener('click',saveEdit);
document.getElementById('editCancel').addEventListener('click',()=>closeSheet('editOverlay'));
document.getElementById('editDelete').addEventListener('click',deleteSong);

document.getElementById('menuBtn').addEventListener('click',()=>openSheet('menuOverlay'));
document.getElementById('menuClose').addEventListener('click',()=>closeSheet('menuOverlay'));
document.getElementById('mExport').addEventListener('click',doExport);
document.getElementById('mImport').addEventListener('click',()=>document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change',e=>{if(e.target.files[0])doImport(e.target.files[0]);e.target.value='';});
document.getElementById('mText').addEventListener('click',doCopyText);
document.getElementById('mReset').addEventListener('click',doReset);

[ 'editOverlay','menuOverlay' ].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{ if(e.target.id===id) closeSheet(id); });
});
function blurT(el){ if(el&&el.blur) el.blur(); }

render();
</script>
</body>
</html>
